{% extends 'base.html' %}
{% load debug %}

{% block content %}

    {% for post in object_list %}

        <div class="post-entry">

            <h2>{{ post.title }}</h2>

            <p>{{ post.body }}</p>

            <small>
                Автор: {{ post.author }}
            </small>

            <p>{{ post|as_dict }}</p>

        </div>

        <hr>

    {% endfor %}

{% endblock content %}
